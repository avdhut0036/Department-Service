
version: "3.8"

services:
    mysql:
        image: mysql
        container_name: java_mysql
        environment:
            MYSQL_ROOT_PASSWORD: "root"
            MYSQL_ROOT_USERNAME: "root"
            MYSQL_DATABASE: "devops"
        ports:
            - "3308:3306"
        networks:
            - two-tier
        volumes:
            - mysql-data:/var/lib/mysql
        restart: always
        healthcheck:
            test: ["CMD","mysqladmin","ping","-h","localhost","-uroot","-proot"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 60s
            
    
    
    java-app:
        container_name: crud_app
        build:
            context: .
        ports:
            - "9095:9095"
        environment:
            MYSQL_DATABASE: "devops"
            MYSQL_HOST: "mysql"
            MYSQL_USERNAME: "root"
            MYSQL_PASSWORD: "root"
        networks:
            - two-tier
        depends_on: 
            - mysql
        restart: always
        healthcheck:
            test: ["CMD-SHELL","curl -f http://localhost:9095/ || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 60s

networks:
    two-tier:
    
volumes:
    mysql-data:
    